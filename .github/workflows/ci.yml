name: CI - Integración Continua

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-y-typecheck:
    name: Lint y verificación de tipos
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Obtener directorio de caché de pnpm
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Configurar caché de pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Verificar tipos TypeScript - API
        run: pnpm --filter api exec tsc --noEmit

      - name: Verificar tipos TypeScript - Web
        run: pnpm --filter web exec tsc --noEmit

      - name: Lint - Web
        run: pnpm --filter web lint
        continue-on-error: false

  tests-unitarios:
    name: Tests unitarios
    runs-on: ubuntu-latest
    needs: lint-y-typecheck

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Obtener directorio de caché de pnpm
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Configurar caché de pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Ejecutar tests unitarios - API
        run: pnpm --filter api test

      - name: Ejecutar tests unitarios - Web
        run: pnpm --filter web test

  build:
    name: Build de producción
    runs-on: ubuntu-latest
    needs: tests-unitarios

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Obtener directorio de caché de pnpm
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Configurar caché de pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build de producción - Web
        run: pnpm --filter web build
        env:
          # Variables de entorno placeholder para el build de Next.js
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          CRON_SECRET: placeholder

      - name: Confirmar build exitoso
        run: |
          echo "Build completado exitosamente"
          ls -la apps/web/.next/ 2>/dev/null && echo "Directorio .next generado correctamente" || echo "Advertencia: directorio .next no encontrado"
